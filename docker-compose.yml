services:

  backend:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    depends_on:
      - redis:
        condition: service_started 

  redis:
    image: redis:7-alpine
    healthcheck:
    test: ["CMD", "redis-cli", "ping"]
    interval: 5s
    timeout: 3s
    retries: 10

  frontend:
    image: nginx:alpine
    ports:
      - "8081:80"
    volumes:
      - ./gui:/usr/share/nginx/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend